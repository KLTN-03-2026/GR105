version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: dms_postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: dms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: dms_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: